<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2600" viewBox="0 0 1200 2600">
  <defs>
    <!-- Dark, muted GitHub-syntax-inspired theme (readability first) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1720"/>
      <stop offset="100%" stop-color="#0b1118"/>
    </linearGradient>

    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#cbd6df"/>
    </marker>

    <style><![CDATA[
      /* Palette (muted, high-contrast on dark bg) */
      :root{
        --bg: #0b1118;           /* page background */
        --panel: #0f1724;        /* panel cards */
        --panel-border: #27313c; /* panel border */
        --accent: #58a6ff;       /* headings / highlights */
        --text: #cbd6df;         /* primary text */
        --muted: #8b949e;        /* secondary text */
        --subtle: rgba(255,255,255,0.03);

        --grid-bg: #0c1822;
        --grid-line: rgba(255,255,255,0.03);

        --tileEmpty: #16242f;
        --tileEmptyStroke: #27414e;

        --cellHot: #234e33;
        --cellHotStroke: #4aa16a;

        --cellMed: #254361;
        --cellMedStroke: #4c7fc3;

        --objA: #d6a84a;
        --objA-stroke: #9a6d20;

        --objB: #5fb0e6;
        --objB-stroke: #2f85c4;

        --objC: #e68aa1;
        --objC-stroke: #c05a6f;

        --bucket: #0e1a26;
        --bucket-stroke: #294053;

        --leafA: #112733;
        --leafB: #133022;
        --leafC: #2b1a11;
        --leafD: #221430;
        --leaf-stroke: #314a63;

        --floor: #13202b;
        --floor-stroke: #2c4457;

        --note-bg: #122127;
        --note-border: #2b3b47;
      }

      /* Base typography */
      text { font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .title { font-weight:700; font-size:30px; fill:var(--accent); }
      .subtitle { font-size:16px; fill:var(--muted); }
      .section { font-weight:700; font-size:22px; fill:var(--text); }
      .h3 { font-weight:700; font-size:16px; fill:var(--text); }
      .body { font-size:14px; fill:var(--text); }
      .small { font-size:12px; fill:var(--muted); }
      .tiny { font-size:11px; fill:var(--muted); }

      /* Panels */
      .panel { fill:var(--panel); stroke:var(--panel-border); stroke-width:1.2; rx:14; }
      .soft { fill:var(--grid-bg); stroke:var(--subtle); stroke-width:1.0; rx:10; }
      .note { fill:var(--note-bg); stroke:var(--note-border); stroke-width:1.0; rx:10; }
      .good { fill:#0f2621; stroke:#244b3f; stroke-width:1.0; rx:10; } /* greenish */
      .warn { fill:#2a1416; stroke:#5a2b2f; stroke-width:1.0; rx:10; } /* reddish */

      /* grid and cell visuals */
      .grid { stroke:var(--grid-line); stroke-width:1; }
      .cell { fill:var(--tileEmpty); stroke:var(--tileEmptyStroke); stroke-width:1; }
      .cellHot { fill:var(--cellHot); stroke:var(--cellHotStroke); stroke-width:1.2; }
      .cellMed { fill:var(--cellMed); stroke:var(--cellMedStroke); stroke-width:1.2; }

      /* objects */
      .obj { fill:var(--objA); stroke:var(--objA-stroke); stroke-width:1.2; }
      .obj2 { fill:var(--objB); stroke:var(--objB-stroke); stroke-width:1.2; }
      .obj3 { fill:var(--objC); stroke:var(--objC-stroke); stroke-width:1.2; }

      /* buckets / leaves / floors */
      .bucket { fill:var(--bucket); stroke:var(--bucket-stroke); stroke-width:1.1; rx:8; }
      .leafA { fill:var(--leafA); stroke:var(--leaf-stroke); stroke-width:1.2; }
      .leafB { fill:var(--leafB); stroke:var(--leaf-stroke); stroke-width:1.2; }
      .leafC { fill:var(--leafC); stroke:var(--leaf-stroke); stroke-width:1.2; }
      .leafD { fill:var(--leafD); stroke:var(--leaf-stroke); stroke-width:1.2; }

      .wall { fill:#2a3440; stroke:#3f4e63; stroke-width:1.2; }
      .floor { fill:var(--floor); stroke:var(--floor-stroke); stroke-width:1.2; }

      /* helpers */
      .arrowline { stroke:var(--text); stroke-width:1.6; fill:none; marker-end:url(#arrow); opacity:0.95; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="2600" fill="url(#bg)"/>

  <!-- HEADER -->
  <rect x="30" y="24" width="1140" height="160" class="panel"/>
  <text x="55" y="70" class="title">How Spatial Cells, Hashing, unordered_map, and BSP Leaves Work Together</text>
  <text x="55" y="102" class="subtitle">Beginner-friendly, top-to-bottom visual explanation with plain language and 3D-style sketches</text>

  <rect x="55" y="118" width="1088" height="50" class="note"/>
  <text x="70" y="145" class="body">
    Big picture: We split space into small areas (cells/leaves), label them, and store those labels in a fast lookup table.
  </text>
  <text x="70" y="163" class="body">
    Result: rapid “what is near me?” queries for collision, movement, sound, and gameplay checks.
  </text>

  <!-- SECTION 1 -->
  <rect x="30" y="210" width="1140" height="520" class="panel"/>
  <text x="55" y="250" class="section">1) Cell Mechanism (What a “cell” is and why it helps)</text>

  <!-- Left: explanation -->
  <rect x="55" y="270" width="500" height="430" class="soft"/>
  <text x="75" y="300" class="h3">Think “city map tiles”</text>
  <text x="75" y="330" class="body">A cell is a small chunk of world space.</text>
  <text x="75" y="352" class="body">Instead of checking the whole world every frame,</text>
  <text x="75" y="374" class="body">we check only nearby chunks.</text>

  <text x="75" y="415" class="h3">How an object is inserted</text>
  <text x="75" y="440" class="body">1. Take object position (x, y, z).</text>
  <text x="75" y="462" class="body">2. Convert to cell coordinates (cx, cy, cz)</text>
  <text x="75" y="484" class="body">   by dividing by cell size.</text>
  <text x="75" y="506" class="body">3. Store object ID in that cell’s list.</text>
  <text x="75" y="528" class="body">4. For large objects, add to multiple cells.</text>

  <rect x="75" y="555" width="460" height="120" class="good"/>
  <text x="90" y="580" class="body">Why fast? If player is in one cell, we usually only inspect:</text>
  <text x="90" y="602" class="body">• current cell</text>
  <text x="90" y="624" class="body">• neighboring cells (for overlap/edge cases)</text>
  <text x="90" y="646" class="body">Not the entire map.</text>

  <!-- Right: 3D-ish grid -->
  <rect x="580" y="270" width="565" height="430" class="soft"/>
  <text x="600" y="300" class="h3">3D-style view of stacked cells</text>

  <g transform="translate(640,350)">
    <polygon points="0,90 220,30 420,110 200,170" class="floor"/>
    <polygon points="220,30 220,160 420,240 420,110" fill="#111827" stroke="#2b3a48"/>
    <polygon points="0,90 0,220 220,160 220,30" fill="#0f1b28" stroke="#2b3a48"/>

    <!-- cell lines (clearer, subtle) -->
    <g class="grid">
      <line x1="55" y1="75" x2="255" y2="135"/>
      <line x1="110" y1="60" x2="310" y2="120"/>
      <line x1="165" y1="45" x2="365" y2="105"/>
      <line x1="55" y1="205" x2="255" y2="145"/>
      <line x1="110" y1="190" x2="310" y2="130"/>
      <line x1="165" y1="175" x2="365" y2="115"/>
      <line x1="55" y1="75" x2="55" y2="205"/>
      <line x1="110" y1="60" x2="110" y2="190"/>
      <line x1="165" y1="45" x2="165" y2="175"/>
      <line x1="220" y1="30" x2="220" y2="160"/>
      <line x1="275" y1="45" x2="275" y2="175"/>
      <line x1="330" y1="60" x2="330" y2="190"/>
      <line x1="385" y1="75" x2="385" y2="205"/>
    </g>

    <!-- highlighted cells (distinct colors) -->
    <rect x="200" y="95" width="35" height="35" class="cellHot" rx="3" ry="3"/>
    <rect x="240" y="110" width="35" height="35" class="cellMed" rx="3" ry="3"/>

    <!-- objects -->
    <circle cx="215" cy="110" r="10" class="obj"/>
    <circle cx="255" cy="125" r="8" class="obj2"/>
    <circle cx="180" cy="130" r="8" class="obj3"/>
  </g>

  <text x="600" y="640" class="small">Yellow/blue/pink circles = objects stored in local cells.</text>
  <text x="600" y="662" class="small">Only nearby cells are queried for collision/interaction.</text>

  <!-- SECTION 2 -->
  <rect x="30" y="760" width="1140" height="560" class="panel"/>
  <text x="55" y="800" class="section">2) Hashing + std::unordered_map (fast label-to-bucket lookup)</text>

  <rect x="55" y="820" width="1090" height="120" class="note"/>
  <text x="75" y="850" class="body">Plain analogy: Hashing is like turning an address (cell coordinate) into a mailbox number quickly.</text>
  <text x="75" y="874" class="body">std::unordered_map is the wall of mailboxes. You open one mailbox (bucket) and look inside, instead of searching every box.</text>
  <text x="75" y="898" class="body">If two addresses map to the same mailbox, they sit together (hash collision).</text>

  <!-- left flow -->
  <rect x="55" y="960" width="520" height="330" class="soft"/>
  <text x="75" y="992" class="h3">Lookup flow (non-programmer version)</text>

  <rect x="75" y="1015" width="210" height="60" class="bucket"/>
  <text x="88" y="1040" class="body">Cell key</text>
  <text x="88" y="1060" class="small">(cx, cy, cz) = (12, 4, 1)</text>

  <path d="M 290 1045 L 350 1045" class="arrowline"/>

  <rect x="355" y="1015" width="190" height="60" class="bucket"/>
  <text x="368" y="1040" class="body">Hash function</text>
  <text x="368" y="1060" class="small">mix bits → index</text>

  <path d="M 290 1125 L 350 1125" class="arrowline"/>

  <rect x="75" y="1095" width="210" height="60" class="bucket"/>
  <text x="88" y="1120" class="body">Result index</text>
  <text x="88" y="1140" class="small">e.g. bucket #237</text>

  <rect x="355" y="1095" width="190" height="60" class="bucket"/>
  <text x="368" y="1120" class="body">Open bucket</text>
  <text x="368" y="1140" class="small">check entries inside</text>

  <text x="75" y="1190" class="body">Then compare exact key to confirm the right cell.</text>
  <text x="75" y="1212" class="body">Expected average time is near O(1) for find/insert/erase.</text>
  <text x="75" y="1234" class="tiny">(“About constant time” when table is healthy and hash is good.)</text>

  <!-- right bucket diagram -->
  <rect x="595" y="960" width="550" height="330" class="soft"/>
  <text x="615" y="992" class="h3">Mailbox wall (unordered_map buckets)</text>

  <g transform="translate(620,1020)">
    <rect x="0" y="0" width="500" height="220" fill="#0f1724" stroke="#27313c"/>
    <g>
      <rect x="15" y="20" width="90" height="180" class="bucket"/>
      <rect x="115" y="20" width="90" height="180" class="bucket"/>
      <rect x="215" y="20" width="90" height="180" class="bucket"/>
      <rect x="315" y="20" width="90" height="180" class="bucket"/>
      <rect x="415" y="20" width="70" height="180" class="bucket"/>
    </g>
    <text x="35" y="40" class="tiny">#235</text>
    <text x="135" y="40" class="tiny">#236</text>
    <text x="235" y="40" class="tiny">#237</text>
    <text x="335" y="40" class="tiny">#238</text>
    <text x="430" y="40" class="tiny">...</text>

    <rect x="225" y="55" width="70" height="26" fill="#0f2a19" stroke="#234d2d"/>
    <text x="229" y="72" class="tiny">(12,4,1)</text>

    <rect x="225" y="88" width="70" height="26" fill="#2a1113" stroke="#5d2a2d"/>
    <text x="229" y="105" class="tiny">(99,2,0)</text>

    <rect x="225" y="121" width="70" height="26" fill="#0f2635" stroke="#2f526f"/>
    <text x="229" y="138" class="tiny">(43,9,3)</text>

    <text x="20" y="210" class="tiny">Multiple keys can share one bucket; exact key comparison picks the right one.</text>
  </g>

  <!-- SECTION 3 -->
  <rect x="30" y="1350" width="1140" height="600" class="panel"/>
  <text x="55" y="1390" class="section">3) BSP Leaves: what they are and how they help generation + runtime spatialization</text>

  <rect x="55" y="1410" width="1090" height="95" class="note"/>
  <text x="75" y="1438" class="body">BSP (Binary Space Partition) splits the map with planes, recursively, into final small convex regions called leaves.</text>
  <text x="75" y="1462" class="body">A leaf is a “final room chunk” the engine can reason about for visibility, collision locality, sound, and queries.</text>
  <text x="75" y="1486" class="body">Think: cutting a building floor plan repeatedly until you get manageable sections.</text>

  <!-- left: 2D bsp split -->
  <rect x="55" y="1520" width="520" height="400" class="soft"/>
  <text x="75" y="1550" class="h3">How leaves are generated (conceptual)</text>
  <rect x="90" y="1570" width="450" height="310" fill="#0e1721" stroke="#27313c"/>

  <!-- partitions -->
  <line x1="240" y1="1570" x2="240" y2="1880" stroke="#2b3a4c" stroke-width="2"/>
  <line x1="90" y1="1705" x2="540" y2="1705" stroke="#2b3a4c" stroke-width="2"/>
  <line x1="360" y1="1570" x2="360" y2="1705" stroke="#2b3a4c" stroke-width="2"/>
  <line x1="360" y1="1780" x2="540" y2="1780" stroke="#2b3a4c" stroke-width="2"/>

  <!-- leaves (muted distinct fills) -->
  <rect x="90" y="1570" width="150" height="135" class="leafA"/>
  <rect x="240" y="1570" width="120" height="135" class="leafB"/>
  <rect x="360" y="1570" width="180" height="135" class="leafC"/>
  <rect x="90" y="1705" width="150" height="175" class="leafD"/>
  <rect x="240" y="1705" width="300" height="75" class="leafA"/>
  <rect x="240" y="1780" width="300" height="100" class="leafB"/>

  <text x="105" y="1638" class="small">Leaf 1</text>
  <text x="275" y="1638" class="small">Leaf 2</text>
  <text x="430" y="1638" class="small">Leaf 3</text>
  <text x="120" y="1800" class="small">Leaf 4</text>
  <text x="350" y="1748" class="small">Leaf 5</text>
  <text x="350" y="1842" class="small">Leaf 6</text>

  <text x="75" y="1905" class="small">Each final colored region is a BSP leaf (a terminal partition).</text>

  <!-- right: 3D-ish bsp room -->
  <rect x="595" y="1520" width="550" height="400" class="soft"/>
  <text x="615" y="1550" class="h3">3D-style mental picture</text>

  <g transform="translate(640,1600)">
    <polygon points="0,70 220,10 430,90 210,150" class="floor"/>
    <polygon points="0,70 0,240 210,320 210,150" fill="#0e1721" stroke="#27313c"/>
    <polygon points="210,150 210,320 430,240 430,90" fill="#0f1a26" stroke="#27313c"/>

    <!-- partition planes projected -->
    <line x1="120" y1="37" x2="120" y2="205" stroke="#2b3a4c" stroke-width="2"/>
    <line x1="275" y1="58" x2="275" y2="226" stroke="#2b3a4c" stroke-width="2"/>
    <line x1="50" y1="135" x2="360" y2="225" stroke="#2b3a4c" stroke-width="2"/>

    <!-- objects -->
    <circle cx="165" cy="140" r="11" class="obj"/>
    <circle cx="305" cy="178" r="10" class="obj2"/>
    <circle cx="245" cy="110" r="10" class="obj3"/>
  </g>

  <text x="615" y="1890" class="small">Leaves provide “which region am I in?” quickly, then local checks happen inside/near that region.</text>

  <!-- SECTION 4 -->
  <rect x="30" y="1980" width="1140" height="470" class="panel"/>
  <text x="55" y="2020" class="section">4) How all pieces interlock in practice (player movement/collision/sound query)</text>

  <rect x="55" y="2040" width="1090" height="110" class="good"/>
  <text x="75" y="2070" class="body">Runtime query chain (simplified):</text>
  <text x="75" y="2094" class="body">A) Find current BSP leaf from position → B) Convert to cell key(s) → C) Hash key into unordered_map bucket</text>
  <text x="75" y="2118" class="body">D) Get local candidates (walls/entities/samples) → E) Run precise collision/occlusion checks only on those.</text>

  <!-- flow diagram -->
  <g transform="translate(70,2170)">
    <rect x="0" y="0" width="180" height="70" class="bucket"/>
    <text x="18" y="28" class="body">Player position</text>
    <text x="18" y="48" class="small">(x,y,z)</text>

    <path d="M 185 35 L 235 35" class="arrowline"/>

    <rect x="240" y="0" width="180" height="70" class="bucket"/>
    <text x="258" y="28" class="body">Locate BSP leaf</text>
    <text x="258" y="48" class="small">region ID</text>

    <path d="M 425 35 L 475 35" class="arrowline"/>

    <rect x="480" y="0" width="180" height="70" class="bucket"/>
    <text x="498" y="28" class="body">Cell key(s)</text>
    <text x="498" y="48" class="small">(cx,cy,cz)</text>

    <path d="M 665 35 L 715 35" class="arrowline"/>

    <rect x="720" y="0" width="180" height="70" class="bucket"/>
    <text x="738" y="28" class="body">Hash + map lookup</text>
    <text x="738" y="48" class="small">bucket entries</text>

    <path d="M 905 35 L 955 35" class="arrowline"/>

    <rect x="960" y="0" width="150" height="70" class="bucket"/>
    <text x="978" y="28" class="body">Precise test</text>
    <text x="978" y="48" class="small">final answer</text>
  </g>

  <!-- PMove note: dark boxed, inside the same canvas area, placed with padding -->
  <rect x="70" y="2260" width="1040" height="160" class="note"/>
  <text x="90" y="2290" class="body">For PMove-style stepping (beginner view):</text>
  <text x="90" y="2318" class="body">• Check forward movement in current cell/leaf candidates.</text>
  <text x="90" y="2346" class="body">• If blocked, try a small upward offset (step height) and test again in nearby cells/leaves.</text>
  <text x="90" y="2374" class="body">• If clear, accept step-up; if not, remain blocked. This feels like “auto-step small ledges”.</text>
  <text x="90" y="2402" class="body">Because lookup is local and hashed, this can happen quickly every frame.</text>

  <!-- footer -->
  <text x="40" y="2550" class="tiny">Tip: If a reader is non-technical, read each section title + yellow note boxes only, then revisit diagrams.</text>
</svg>