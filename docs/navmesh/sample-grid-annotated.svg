<?xml version="1.0" encoding="UTF-8"?>
<!--
  Updated SVG:
  - Increased parent panel (Collision & PMove stepping) height so it can contain the PMove note.
  - PMove note moved inside that panel, directly below the example row.
  - Panel 4 (Legend) moved downward to avoid overlap.
  - Kept approved colors and spacing; only layout heights/positions adjusted.
  - Width kept at 1280px as requested.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="2020" viewBox="0 0 1280 2020" role="img" aria-label="Tile sampling and collision diagram with PMove note inside expanded parent panel">
  <defs>
    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L9 4 L0 8 z" fill="#e7eef6"/>
    </marker>
  </defs>

  <style><![CDATA[
    :root{
      --bg:#0e141c;
      --panel:#131c27;
      --panelBorder:#2a3646;

      --text:#dce6f0;
      --muted:#9fb0c2;
      --heading:#9bc2ff;

      --gridBg:#152233;
      --gridLine:#213248;

      --tileEmpty:#24384e;
      --tileEmptyStroke:#3a5572;
      --tileSample:#2f7f5e;
      --tileSampleStroke:#63b68f;
      --tileHighlight:#3f6fa8;
      --tileHighlightStroke:#8db7ef;
      --cellLine:rgba(227,239,255,0.55);

      --layerFill:#213a54;
      --layerStroke:#3f678d;
      --solidFill:#3a4e63;
      --solidStroke:#68839f;

      --player:#d3a74b;
      --playerStroke:#926d1f;

      --bbox:#f0bd8b;
      --step:#e8a06d;
      --arrow:#dce6f0;

      --legendBg:#182230;
      --legendBorder:#344457;
      --explainBg:#1a2737;
      --explainBorder:#33475f;
    }

    svg { background:var(--bg); font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; }

    .title { fill:var(--heading); font-size:28px; font-weight:700; }
    .subhead { fill:var(--text); font-size:21px; font-weight:600; }
    .text { fill:var(--text); font-size:18px; }
    .small { fill:var(--muted); font-size:16px; }
    .panel { fill:var(--panel); stroke:var(--panelBorder); stroke-width:1.5; rx:14; ry:14; }

    .grid-bg { fill:var(--gridBg); stroke:var(--panelBorder); stroke-width:1.2; rx:10; ry:10; }
    .grid-line { stroke:var(--gridLine); stroke-width:1; }

    .tile-empty { fill:var(--tileEmpty); stroke:var(--tileEmptyStroke); stroke-width:1; }
    .tile-sample { fill:var(--tileSample); stroke:var(--tileSampleStroke); stroke-width:1.3; }
    .tile-highlight { fill:var(--tileHighlight); stroke:var(--tileHighlightStroke); stroke-width:1.3; }
    .cell-line { stroke:var(--cellLine); stroke-width:1.05; }

    .layer { fill:var(--layerFill); stroke:var(--layerStroke); stroke-width:1.3; rx:10; ry:10; }
    .solid { fill:var(--solidFill); stroke:var(--solidStroke); stroke-width:1.3; rx:8; ry:8; }

    .player { fill:var(--player); stroke:var(--playerStroke); stroke-width:2; }
    .bbox { fill:none; stroke:var(--bbox); stroke-width:2; stroke-dasharray:5 4; }

    .arrow { stroke:var(--arrow); stroke-width:2; fill:none; marker-end:url(#arrowHead); }

    .legend-card { fill:var(--legendBg); stroke:var(--legendBorder); rx:10; ry:10; }
    .legend-sample { fill:var(--tileSample); stroke:var(--tileSampleStroke); }
    .legend-empty { fill:var(--tileEmpty); stroke:var(--tileEmptyStroke); }
    .legend-solid { fill:var(--solidFill); stroke:var(--solidStroke); }
    .legend-layer { fill:var(--layerFill); stroke:var(--layerStroke); }
    .legend-player { fill:var(--player); stroke:var(--playerStroke); }
    .explain-box { fill:var(--explainBg); stroke:var(--explainBorder); rx:10; ry:10; }
  ]]></style>

  <!-- Header -->
  <g transform="translate(40,38)">
    <text class="title">Tile sampling &amp; collision — vertical readability layout</text>
    <text y="34" class="small">Expanded the Collision panel and placed the PMove note inside it below the examples for clarity.</text>
  </g>

  <!-- PANEL 1: Top-down -->
  <g transform="translate(40,96)">
    <rect class="panel" width="1200" height="700"/>
    <text x="24" y="38" class="subhead">Top-down — sparse tiled sample grid</text>

    <!-- Grid area -->
    <g transform="translate(24,68)">
      <rect class="grid-bg" width="560" height="560"/>
      <g class="grid-line">
        <line x1="35" y1="0" x2="35" y2="560"/><line x1="70" y1="0" x2="70" y2="560"/><line x1="105" y1="0" x2="105" y2="560"/>
        <line x1="140" y1="0" x2="140" y2="560"/><line x1="175" y1="0" x2="175" y2="560"/><line x1="210" y1="0" x2="210" y2="560"/>
        <line x1="245" y1="0" x2="245" y2="560"/><line x1="280" y1="0" x2="280" y2="560"/><line x1="315" y1="0" x2="315" y2="560"/>
        <line x1="350" y1="0" x2="350" y2="560"/><line x1="385" y1="0" x2="385" y2="560"/><line x1="420" y1="0" x2="420" y2="560"/>
        <line x1="455" y1="0" x2="455" y2="560"/><line x1="490" y1="0" x2="490" y2="560"/><line x1="525" y1="0" x2="525" y2="560"/>
        <line x1="0" y1="35" x2="560" y2="35"/><line x1="0" y1="70" x2="560" y2="70"/><line x1="0" y1="105" x2="560" y2="105"/>
        <line x1="0" y1="140" x2="560" y2="140"/><line x1="0" y1="175" x2="560" y2="175"/><line x1="0" y1="210" x2="560" y2="210"/>
        <line x1="0" y1="245" x2="560" y2="245"/><line x1="0" y1="280" x2="560" y2="280"/><line x1="0" y1="315" x2="560" y2="315"/>
        <line x1="0" y1="350" x2="560" y2="350"/><line x1="0" y1="385" x2="560" y2="385"/><line x1="0" y1="420" x2="560" y2="420"/>
        <line x1="0" y1="455" x2="560" y2="455"/><line x1="0" y1="490" x2="560" y2="490"/><line x1="0" y1="525" x2="560" y2="525"/>
      </g>

      <!-- a few sample tiles (illustrative) -->
      <g transform="translate(70,70)"><rect width="35" height="35" class="tile-sample"/><rect width="35" height="35" fill="none" class="cell-line"/><line class="cell-line" x1="8.75" y1="0" x2="8.75" y2="35"/><line class="cell-line" x1="17.5" y1="0" x2="17.5" y2="35"/><line class="cell-line" x1="26.25" y1="0" x2="26.25" y2="35"/><line class="cell-line" x1="0" y1="8.75" x2="35" y2="8.75"/><line class="cell-line" x1="0" y1="17.5" x2="35" y2="17.5"/><line class="cell-line" x1="0" y1="26.25" x2="35" y2="26.25"/></g>
      <g transform="translate(140,210)"><rect width="35" height="35" class="tile-sample"/><rect width="35" height="35" fill="none" class="cell-line"/><line class="cell-line" x1="8.75" y1="0" x2="8.75" y2="35"/><line class="cell-line" x1="17.5" y1="0" x2="17.5" y2="35"/><line class="cell-line" x1="26.25" y1="0" x2="26.25" y2="35"/><line class="cell-line" x1="0" y1="8.75" x2="35" y2="8.75"/><line class="cell-line" x1="0" y1="17.5" x2="35" y2="17.5"/><line class="cell-line" x1="0" y1="26.25" x2="35" y2="26.25"/></g>
      <g transform="translate(245,140)"><rect width="35" height="35" class="tile-sample"/><rect width="35" height="35" fill="none" class="cell-line"/><line class="cell-line" x1="8.75" y1="0" x2="8.75" y2="35"/><line class="cell-line" x1="17.5" y1="0" x2="17.5" y2="35"/><line class="cell-line" x1="26.25" y1="0" x2="26.25" y2="35"/><line class="cell-line" x1="0" y1="8.75" x2="35" y2="8.75"/><line class="cell-line" x1="0" y1="17.5" x2="35" y2="17.5"/><line class="cell-line" x1="0" y1="26.25" x2="35" y2="26.25"/></g>
      <g transform="translate(315,70)"><rect width="35" height="35" class="tile-highlight"/><rect width="35" height="35" fill="none" class="cell-line"/><line class="cell-line" x1="8.75" y1="0" x2="8.75" y2="35"/><line class="cell-line" x1="17.5" y1="0" x2="17.5" y2="35"/><line class="cell-line" x1="26.25" y1="0" x2="26.25" y2="35"/><line class="cell-line" x1="0" y1="8.75" x2="35" y2="8.75"/><line class="cell-line" x1="0" y1="17.5" x2="35" y2="17.5"/><line class="cell-line" x1="0" y1="26.25" x2="35" y2="26.25"/></g>
      <g transform="translate(385,175)"><rect width="35" height="35" class="tile-sample"/><rect width="35" height="35" fill="none" class="cell-line"/><line class="cell-line" x1="8.75" y1="0" x2="8.75" y2="35"/><line class="cell-line" x1="17.5" y1="0" x2="17.5" y2="35"/><line class="cell-line" x1="26.25" y1="0" x2="26.25" y2="35"/><line class="cell-line" x1="0" y1="8.75" x2="35" y2="8.75"/><line class="cell-line" x1="0" y1="17.5" x2="35" y2="17.5"/><line class="cell-line" x1="0" y1="26.25" x2="35" y2="26.25"/></g>
      <g transform="translate(455,420)"><rect width="35" height="35" class="tile-sample"/><rect width="35" height="35" fill="none" class="cell-line"/><line class="cell-line" x1="8.75" y1="0" x2="8.75" y2="35"/><line class="cell-line" x1="17.5" y1="0" x2="17.5" y2="35"/><line class="cell-line" x1="26.25" y1="0" x2="26.25" y2="35"/><line class="cell-line" x1="0" y1="8.75" x2="35" y2="8.75"/><line class="cell-line" x1="0" y1="17.5" x2="35" y2="17.5"/><line class="cell-line" x1="0" y1="26.25" x2="35" y2="26.25"/></g>
    </g>

    <!-- Explain card (right) -->
    <g transform="translate(618,100)">
      <rect class="explain-box" width="542" height="232"/>
      <text x="22" y="38" class="subhead" fill="#9bc2ff">What the 4×4 cells mean</text>
      <text x="22" y="72" class="text">
        <tspan x="22" dy="0">Each drawn tile in the grid (representing a logical 32×32 tile) is subdivided</tspan>
        <tspan x="22" dy="28">into a 4×4 grid of cells for illustration. Conceptually: one 32×32 tile →</tspan>
        <tspan x="22" dy="28">4×4 coarse sampler cells (each cell ≈ 8×8 texels). Game samplers or</tspan>
        <tspan x="22" dy="28">collision checks can test these smaller cells to get localized information</tspan>
        <tspan x="22" dy="28">inside a tile without sampling every texel.</tspan>
      </text>
    </g>

    <g transform="translate(24,654)">
      <text class="small">
        <tspan x="0" dy="0">Sparse sampling checks only selected tiles and cells — faster than checking every point while preserving useful local detail.</tspan>
      </text>
    </g>
  </g>

  <!-- PANEL 2: Side view -->
  <g transform="translate(40,820)">
    <rect class="panel" width="1200" height="205"/>
    <text x="24" y="42" class="subhead">Side view — multi-layer / stacked samples</text>
    <g transform="translate(24,84)">
      <line x1="18" y1="10" x2="18" y2="96" stroke="#708294" stroke-dasharray="4 4"/>
      <text x="0" y="0" class="small">different heights</text>
      <rect class="solid" x="90" y="30" width="190" height="32"/>
      <text x="292" y="53" class="small">Layer 1 — low platform</text>
      <rect class="solid" x="525" y="16" width="200" height="32"/>
      <text x="738" y="40" class="small">Layer 2 — higher platform</text>
      <rect class="layer" x="0" y="100" width="1148" height="56"/>
      <text x="12" y="136" class="label">Layer 0 — ground</text>
    </g>
  </g>

  <!-- PANEL 3: Collision & PMove (PARENT HEIGHT INCREASED) -->
  <!-- Note: panel height increased from previous versions to 390 -> 520 to provide more space -->
  <g transform="translate(40,1045)">
    <rect class="panel" width="1200" height="520"/>
    <text x="24" y="42" class="subhead">Collision &amp; PMove stepping</text>

    <!-- Interaction row (kept near top of the panel) -->
    <g transform="translate(24,94)">
      <rect class="layer" x="14" y="160" width="340" height="64"/>
      <text x="28" y="200" class="small">flat ground</text>

      <rect class="solid" x="430" y="146" width="250" height="96"/>
      <text x="444" y="184" class="small">small step / ledge</text>

      <g transform="translate(225,180)">
        <circle class="player" cx="0" cy="0" r="18"/>
        <rect class="bbox" x="-20" y="-40" width="40" height="80"/>
        <text x="-54" y="74" class="small">player + collision box</text>
      </g>

      <path class="arrow" d="M 252 180 L 345 180"/>
      <text x="299" y="166" class="small" text-anchor="middle">moving →</text>

      <g transform="translate(430,172)">
        <circle class="player" cx="50" cy="48" r="18"/>
        <rect class="bbox" x="30" y="18" width="40" height="80"/>
        <text x="-8" y="-10" class="small">tries to climb step</text>
      </g>

      <line x1="740" y1="146" x2="740" y2="270" stroke="var(--step)" stroke-width="3"/>
      <line x1="726" y1="146" x2="754" y2="146" stroke="var(--step)" stroke-width="3"/>
      <text x="762" y="184" class="small">step height threshold</text>
    </g>

    <!-- PMove note PLACED INSIDE panel BELOW the row (explicitly within parent) -->
    <g transform="translate(24,300)">
      <rect x="0" y="0" width="1152" height="100" fill="#111820" stroke="#273241" rx="8" ry="8"/>
      <text x="12" y="28" class="text">
        <tspan x="12" dy="0" font-weight="700">PMove-style stepping</tspan>
      </text>
      <text x="12" y="56" class="small">
        <tspan x="12" dy="0">test current and slightly raised positions; if the obstacle is below threshold, the player is stepped up automatically.</tspan>
      </text>
    </g>

    <!-- Extra bottom breathing room (inside panel) -->
    <g transform="translate(24,420)">
      <text class="small" x="0" y="0"> (Panel has been enlarged to contain the explanatory note without overlap.)</text>
    </g>
  </g>

  <!-- PANEL 4: Legend & analogies moved down to avoid overlap with expanded panel 3 -->
  <g transform="translate(40,1600)">
    <rect class="panel" width="1200" height="390"/>
    <text x="24" y="42" class="subhead">Legend &amp; plain-English analogies</text>

    <g transform="translate(24,86)">
      <rect class="legend-card" width="530" height="284"/>
      <g transform="translate(18,18)">
        <rect x="0" y="8" width="20" height="13" class="legend-sample"/><text x="32" y="20" class="text">Sampled tile — marked when checked</text>
        <rect x="0" y="42" width="20" height="13" class="legend-empty"/><text x="32" y="54" class="text">Empty tile — nothing important</text>
        <rect x="0" y="76" width="20" height="13" class="legend-solid"/><text x="32" y="88" class="text">Solid geometry — platform / floor</text>
        <rect x="0" y="110" width="20" height="13" class="legend-layer"/><text x="32" y="122" class="text">Layer band — indicates a height</text>
        <rect x="0" y="144" width="20" height="13" class="legend-player"/><text x="32" y="156" class="text">Player + collision box</text>

        <rect x="0" y="186" width="46" height="46" class="legend-empty"/>
        <g transform="translate(0,186)" fill="none">
          <line x1="11.5" y1="0" x2="11.5" y2="46" class="cell-line"/><line x1="23" y1="0" x2="23" y2="46" class="cell-line"/><line x1="34.5" y1="0" x2="34.5" y2="46" class="cell-line"/>
          <line x1="0" y1="11.5" x2="46" y2="11.5" class="cell-line"/><line x1="0" y1="23" x2="46" y2="23" class="cell-line"/><line x1="0" y1="34.5" x2="46" y2="34.5" class="cell-line"/>
        </g>
        <text x="60" y="205" class="text">Tile subdivided into 4×4 cells (illustrative)</text>
        <text x="60" y="225" class="small">(32×32 tile → 4×4 coarse cells ≈ 8×8 each)</text>
      </g>
    </g>

    <g transform="translate(580,86)">
      <rect class="legend-card" width="596" height="284"/>
      <text x="18" y="30" class="subhead">Plain-English analogies</text>
      <text x="18" y="66" class="text">
        <tspan x="18" dy="0"><tspan font-weight="700">Tiles</tspan> — floor tiles in a room; each square can be marked if it contains geometry.</tspan>
        <tspan x="18" dy="38"><tspan font-weight="700">Sparse</tspan> — most tiles are empty; only a few are sampled so we save work.</tspan>
        <tspan x="18" dy="38"><tspan font-weight="700">Layers</tspan> — transparent sheets stacked; each shows what exists at that height.</tspan>
        <tspan x="18" dy="38"><tspan font-weight="700">Sample grid</tspan> — low-detail checklist used by the engine for fast collision / stepping decisions.</tspan>
      </text>
    </g>
  </g>
</svg>