<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" role="img" aria-label="Isometric diagram of LOS simplification">
  <defs>
    <linearGradient id="corridor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fcfe0" />
      <stop offset="100%" stop-color="#4a8fbf" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd27f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffb34b" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#0e1320"/>
  <g transform="translate(40 180) skewX(-30) scale(1 -1)">
    <rect x="0" y="0" width="220" height="120" fill="#1b263a" stroke="#182030" stroke-width="2" />
    <g stroke="#13203b" stroke-width="1">
      <rect x="10" y="10" width="40" height="50" fill="none" />
      <rect x="55" y="10" width="40" height="50" fill="none" />
      <rect x="100" y="10" width="40" height="50" fill="none" />
      <rect x="145" y="10" width="40" height="50" fill="none" />
      <rect x="190" y="10" width="30" height="50" fill="none" />
    </g>
    <path d="M 40 60 L 150 80 L 210 40" fill="none" stroke="#ffd27f" stroke-width="2" stroke-linecap="round" />
    <path d="M 40 60 L 150 80 L 210 40" fill="none" stroke="url(#glow)" stroke-width="10" stroke-opacity="0.4" />
    <circle cx="40" cy="60" r="6" fill="#ffe57f" stroke="#3a2d15" stroke-width="2"/>
    <circle cx="210" cy="40" r="6" fill="#ffe57f" stroke="#3a2d15" stroke-width="2"/>
  </g>
  <text x="12" y="28" fill="#cfd8ff" font-size="12" font-family="Segoe UI">Tiles/cells grid (skewed isometric)</text>
  <text x="12" y="48" fill="#cfd8ff" font-size="12" font-family="Segoe UI">Narrow corridor highlighted in blue</text>
  <text x="12" y="68" fill="#ffd27f" font-size="12" font-family="Segoe UI">LOS span shown as golden line</text>
  <text x="12" y="88" fill="#ffd27f" font-size="12" font-family="Segoe UI">Clearance band rendered as translucent glow</text>
</svg>