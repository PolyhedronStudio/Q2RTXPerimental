<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">
  <defs>
    <style>
      .title { font: 700 28px sans-serif; fill: #20242b; }
      .label { font: 600 16px sans-serif; fill: #20242b; }
      .small { font: 14px sans-serif; fill: #303744; }
      .base { fill: #e7eef8; stroke: #7b8aa0; stroke-width: 1.5; }
      .blocked { fill: #ffb3b3; stroke: #c92a2a; stroke-width: 2; }
      .soft { fill: #ffe7a8; stroke: #bf8b00; stroke-width: 2; }
      .portal { fill: #ffe066; stroke: #8c6f00; stroke-width: 2; }
      .portalBlocked { fill: #ff9f9f; stroke: #c92a2a; stroke-width: 2; }
      .portalPenalty { fill: #ffd8a8; stroke: #c97717; stroke-width: 2; }
      .route { fill: none; stroke: #1c7ed6; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .alt { fill: none; stroke: #2b8a3e; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .callout { fill: #ffffff; stroke: #aab4c0; stroke-width: 1.5; }
      .brush { fill: #7d8898; opacity: 0.2; }
    </style>
  </defs>

  <rect width="960" height="640" fill="#f7f9fc"/>
  <text x="40" y="48" class="title">Dynamic overlays stay local on top of the static hierarchy</text>
  <text x="40" y="76" class="small">Dynamic occupancy and local portal invalidation modify routing locally without regenerating the static region/portal graph.</text>

  <g transform="translate(70,120)">
    <text x="0" y="-18" class="label">A. Sparse occupancy overlay on the fine grid</text>
    <g>
      <polygon class="brush" points="180,20 275,-18 350,20 255,58"/>
      <g>
        <polygon class="base" points="0,120 90,84 180,120 90,156"/>
        <polygon class="base" points="90,84 180,48 270,84 180,120"/>
        <polygon class="base" points="180,48 270,12 360,48 270,84"/>
        <polygon class="base" points="0,192 90,156 180,192 90,228"/>
        <polygon class="base" points="90,156 180,120 270,156 180,192"/>
        <polygon class="base" points="180,120 270,84 360,120 270,156"/>
        <polygon class="base" points="0,264 90,228 180,264 90,300"/>
        <polygon class="base" points="90,228 180,192 270,228 180,264"/>
        <polygon class="base" points="180,192 270,156 360,192 270,228"/>
      </g>
      <polygon class="soft" points="90,156 180,120 270,156 180,192"/>
      <polygon class="blocked" points="180,120 270,84 360,120 270,156"/>
      <path class="route" d="M38 192 L128 156 L218 120 L308 156"/>
      <path class="alt" d="M38 192 L128 228 L218 264 L308 228"/>
      <text x="6" y="312" class="small">Blue = ideal straight route</text>
      <text x="6" y="334" class="small">Green = reroute around local occupancy</text>
    </g>
  </g>

  <g transform="translate(500,120)">
    <text x="0" y="-18" class="label">B. Local portal overlay on the coarse graph</text>
    <g>
      <rect x="0" y="20" width="120" height="90" rx="10" fill="#d7ecff" stroke="#4b8fd3" stroke-width="2"/>
      <rect x="170" y="20" width="120" height="90" rx="10" fill="#dff7da" stroke="#4a9b55" stroke-width="2"/>
      <rect x="340" y="20" width="120" height="90" rx="10" fill="#ffe8cc" stroke="#d08a2a" stroke-width="2"/>
      <text x="34" y="72" class="label">Region A</text>
      <text x="204" y="72" class="label">Region B</text>
      <text x="374" y="72" class="label">Region C</text>

      <rect x="126" y="54" width="38" height="22" rx="4" class="portalBlocked"/>
      <rect x="296" y="54" width="38" height="22" rx="4" class="portalPenalty"/>
      <path class="route" d="M60 154 C140 120, 200 120, 400 154"/>
      <path class="alt" d="M60 182 C160 250, 340 250, 400 182"/>
      <text x="14" y="286" class="small">Red portal = locally invalidated or blocked</text>
      <text x="14" y="308" class="small">Orange portal = locally penalized but still usable</text>
      <text x="14" y="330" class="small">The static portal graph stays intact; only the runtime overlay changes.</text>
    </g>
  </g>

  <g transform="translate(196,458)">
    <rect width="568" height="112" rx="14" class="callout"/>
    <text x="18" y="32" class="label">Why overlays matter</text>
    <text x="18" y="60" class="small">• dynamic occupancy changes fine refinement and LOS locally, without touching static region generation</text>
    <text x="18" y="84" class="small">• local portal overlay changes hierarchy routing locally, without regenerating portals</text>
    <text x="18" y="106" class="small">• both overlays preserve the static-first architecture and avoid global dynamic rebuilds</text>
  </g>
</svg>