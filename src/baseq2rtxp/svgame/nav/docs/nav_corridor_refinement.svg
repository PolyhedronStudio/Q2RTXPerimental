<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <defs>
    <style>
      .title { font: 700 28px sans-serif; fill: #20242b; }
      .label { font: 600 16px sans-serif; fill: #20242b; }
      .small { font: 14px sans-serif; fill: #303744; }
      .grid { stroke: #c8d0db; stroke-width: 1; }
      .wall { fill: #7d8898; }
      .exact { fill: #ffd6a5; stroke: #de8b1f; stroke-width: 1.5; }
      .buffered { fill: #fff0d9; stroke: #e6b45a; stroke-width: 1; opacity: 0.9; }
      .path { fill: none; stroke: #c92a2a; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .los { fill: none; stroke: #1c7ed6; stroke-width: 4; stroke-dasharray: 10 7; }
      .callout { fill: #ffffff; stroke: #aab4c0; stroke-width: 1.5; }
      .arrow { stroke: #20242b; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#20242b"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#f7f9fc"/>
  <text x="40" y="48" class="title">Corridor-constrained refinement and LOS simplification</text>
  <text x="40" y="76" class="small">The coarse route is materialized into an exact corridor, widened into a buffered local search scope, then refined and simplified.</text>

  <g transform="translate(58,120)">
    <text x="0" y="-18" class="label">1. Exact hierarchy corridor</text>
    <g>
      <rect x="0" y="0" width="360" height="300" fill="#ffffff" stroke="#aab4c0" stroke-width="1.5"/>
      <g class="grid">
        <path d="M0 30 H360 M0 60 H360 M0 90 H360 M0 120 H360 M0 150 H360 M0 180 H360 M0 210 H360 M0 240 H360 M0 270 H360"/>
        <path d="M30 0 V300 M60 0 V300 M90 0 V300 M120 0 V300 M150 0 V300 M180 0 V300 M210 0 V300 M240 0 V300 M270 0 V300 M300 0 V300 M330 0 V300"/>
      </g>
      <rect class="wall" x="90" y="30" width="60" height="150"/>
      <rect class="wall" x="210" y="120" width="90" height="60"/>
      <rect class="wall" x="150" y="210" width="90" height="30"/>
      <rect class="exact" x="30" y="120" width="30" height="30"/>
      <rect class="exact" x="60" y="120" width="30" height="30"/>
      <rect class="exact" x="90" y="180" width="30" height="30"/>
      <rect class="exact" x="120" y="180" width="30" height="30"/>
      <rect class="exact" x="150" y="180" width="30" height="30"/>
      <rect class="exact" x="180" y="180" width="30" height="30"/>
      <rect class="exact" x="210" y="210" width="30" height="30"/>
      <rect class="exact" x="240" y="240" width="30" height="30"/>
      <rect class="exact" x="270" y="240" width="30" height="30"/>
      <circle cx="45" cy="135" r="6" fill="#1d6fd6"/>
      <circle cx="285" cy="255" r="6" fill="#c92a2a"/>
    </g>
  </g>

  <g transform="translate(420,120)">
    <text x="0" y="-18" class="label">2. Buffered local refinement scope</text>
    <g>
      <rect x="0" y="0" width="360" height="300" fill="#ffffff" stroke="#aab4c0" stroke-width="1.5"/>
      <g class="grid">
        <path d="M0 30 H360 M0 60 H360 M0 90 H360 M0 120 H360 M0 150 H360 M0 180 H360 M0 210 H360 M0 240 H360 M0 270 H360"/>
        <path d="M30 0 V300 M60 0 V300 M90 0 V300 M120 0 V300 M150 0 V300 M180 0 V300 M210 0 V300 M240 0 V300 M270 0 V300 M300 0 V300 M330 0 V300"/>
      </g>
      <rect class="wall" x="90" y="30" width="60" height="150"/>
      <rect class="wall" x="210" y="120" width="90" height="60"/>
      <rect class="wall" x="150" y="210" width="90" height="30"/>
      <rect class="buffered" x="0" y="90" width="120" height="90"/>
      <rect class="buffered" x="60" y="150" width="180" height="90"/>
      <rect class="buffered" x="180" y="180" width="150" height="120"/>
      <rect class="exact" x="30" y="120" width="30" height="30"/>
      <rect class="exact" x="60" y="120" width="30" height="30"/>
      <rect class="exact" x="90" y="180" width="30" height="30"/>
      <rect class="exact" x="120" y="180" width="30" height="30"/>
      <rect class="exact" x="150" y="180" width="30" height="30"/>
      <rect class="exact" x="180" y="180" width="30" height="30"/>
      <rect class="exact" x="210" y="210" width="30" height="30"/>
      <rect class="exact" x="240" y="240" width="30" height="30"/>
      <rect class="exact" x="270" y="240" width="30" height="30"/>
      <path class="path" d="M45 135 L75 135 L105 195 L195 195 L225 225 L255 255 L285 255"/>
    </g>
  </g>

  <g transform="translate(250,458)">
    <rect width="460" height="110" rx="14" class="callout"/>
    <text x="18" y="32" class="label">3. Simplification after refinement</text>
    <text x="18" y="60" class="small">The red path is the refined local A*  result.</text>
    <text x="18" y="84" class="small">The dashed blue span shows where shared LOS can safely collapse points in open space,</text>
    <text x="18" y="106" class="small">while narrow passages remain conservative because long collapses need extra clearance margin.</text>
  </g>

  <path class="arrow" d="M364 274 C394 274, 402 274, 416 274"/>
  <path class="los" d="M494 255 L705 255"/>
</svg>